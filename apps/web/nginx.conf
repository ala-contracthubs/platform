# Web origin behind CloudFront. nginx-unprivileged listens on 8080 as non-root.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback — unknown routes return index.html (200), so the ALB health
    # check on "/" passes and client-side routing works (INF-25/27).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must not be cached so deploys are picked up immediately;
    # CloudFront also caches it no-cache. Hashed assets are immutable.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Gzip (CloudFront also compresses with Brotli at the edge).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
