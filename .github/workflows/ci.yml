name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    # Real Postgres for the API integration test (web → API → DB path).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: contracthubs
          POSTGRES_PASSWORD: contracthubs
          POSTGRES_DB: contracthubs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contracthubs -d contracthubs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: 'postgresql://contracthubs:contracthubs@localhost:5432/contracthubs?schema=public'

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (incl. flat peer-module boundaries)
        run: pnpm lint

      - name: Apply database migrations (idempotent)
        run: pnpm --filter @contracthubs/api db:migrate:deploy

      # Runs the API health unit + integration tests (boots NestJS against the
      # Postgres service above and checks GET /health reports the DB reachable)
      # and the web /health contract test.
      - name: Test
        run: pnpm test
