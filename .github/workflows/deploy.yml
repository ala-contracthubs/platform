name: deploy

# App-deploy pipeline (INF-48). Trunk-based: push to `main` -> build + deploy STAGING.
# Stable vX.Y.Z tag (cut from `main`) -> promote the SAME tested digest to PROD
# (no rebuild), behind the `production` environment gate.

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2

jobs:
  staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/contracthubs-gha-app-deploy
          aws-region: ${{ env.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, push & deploy (staging)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          TAG="sha-${GITHUB_SHA}"
          API="$REGISTRY/contracthubs/api"
          WEB="$REGISTRY/contracthubs/web"
          docker build -f apps/api/Dockerfile -t "$API:$TAG" .
          docker build -f apps/web/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://api.stage.contracthubs.com \
            -t "$WEB:$TAG" .
          docker push "$API:$TAG"
          docker push "$WEB:$TAG"
          chmod +x infra/scripts/deploy.sh
          infra/scripts/deploy.sh stage "$API:$TAG" "$WEB:$TAG"

  production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production # manual-approval gate (INF-48)
    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/contracthubs-gha-app-deploy
          aws-region: ${{ env.AWS_REGION }}
      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Promote tested digest & deploy (prod)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          TAG="sha-${GITHUB_SHA}"      # image built & tested on staging for this commit
          VERSION="${GITHUB_REF_NAME}" # e.g. v1.2.0
          API="$REGISTRY/contracthubs/api"
          WEB="$REGISTRY/contracthubs/web"

          # Promote the SAME digest — never rebuild for prod (INF-48/49).
          promote() {
            local repo="$1"
            aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$TAG" >/dev/null \
              || { echo "No tested image $repo:$TAG. Was this commit pushed to main (which builds & stages it) before tagging? (INF-49)"; exit 1; }
            MANIFEST=$(aws ecr batch-get-image --repository-name "$repo" --image-ids imageTag="$TAG" \
              --query 'images[0].imageManifest' --output text)
            # Tag the existing digest with the semver (immutable: ignore 're-tag' errors).
            aws ecr put-image --repository-name "$repo" --image-tag "$VERSION" --image-manifest "$MANIFEST" >/dev/null 2>&1 || true
          }
          promote contracthubs/api
          promote contracthubs/web

          chmod +x infra/scripts/deploy.sh
          infra/scripts/deploy.sh prod "$API:$TAG" "$WEB:$TAG"
