# Local development database. Start with `docker compose up -d` before running
# migrations or `pnpm test` (the API integration test needs a real Postgres).
services:
  postgres:
    image: postgres:16
    container_name: contracthubs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contracthubs
      POSTGRES_PASSWORD: contracthubs
      POSTGRES_DB: contracthubs
    ports:
      - '5432:5432'
    volumes:
      - contracthubs-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contracthubs -d contracthubs']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  contracthubs-pgdata:
